<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>계산기 앱</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .calculator {
      width: 320px;
      padding: 24px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    .reset {
      background: #6b7280;
    }

    .result {
      margin-top: 16px;
      padding: 14px;
      background: #f9fafb;
      border-radius: 12px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h1>계산기</h1>

    <input id="num1" type="number" placeholder="첫 번째 숫자" />

    <select id="operator">
      <option value="+">더하기 +</option>
      <option value="-">빼기 -</option>
      <option value="*">곱하기 ×</option>
      <option value="/">나누기 ÷</option>
    </select>

    <input id="num2" type="number" placeholder="두 번째 숫자" />

    <button id="calculateBtn">계산하기</button>
    <button id="resetBtn" class="reset">초기화</button>

    <div class="result" id="result">결과:</div>
  </div>

  <script type="module" src="/src/app.ts"></script>
</body>
</html>
